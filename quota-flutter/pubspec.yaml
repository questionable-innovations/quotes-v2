name: quota
description: Mobile client for quote book

publish_to: "none"

version: 2.0.0

environment:
  sdk: ">=3.1.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.2
  fuzzywuzzy: ^1.1.6
  dynamic_color: ^1.7.0
  image_picker: ^1.2.3
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/quota_logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  windows:
    generate: false
  macos:
    generate: false
  web:
    generate: false
